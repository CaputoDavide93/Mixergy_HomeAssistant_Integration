name: Bug Report
description: File a bug report for the Mixergy integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please provide as much information as possible to help us reproduce and fix the issue.

  - type: dropdown
    id: experience_mode
    attributes:
      label: Experience Mode
      description: Which experience mode are you using?
      options:
        - Simple
        - Advanced
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: What version of Home Assistant are you running?
      placeholder: "2024.12.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: What version of the Mixergy integration are you running?
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: tank_model
    attributes:
      label: Tank Model / Configuration
      description: Your tank model and any add-ons (e.g. PV diverter, heat pump)
      placeholder: "Mixergy 180L with PV diverter"
    validations:
      required: false

  - type: textarea
    id: describe_bug
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: |
        Please enable debug logging for the integration and paste relevant log lines here.
        Add this to your `configuration.yaml`:
        ```yaml
        logger:
          default: warning
          logs:
            custom_components.mixergy: debug
        ```
      render: text
    validations:
      required: false

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: |
        Download the integration diagnostics from **Settings → Devices & Services → Mixergy → Download diagnostics**
        and paste the contents here (credentials are automatically redacted).
      render: json
    validations:
      required: false
